name: Build

# Runs on every push and pull request to verify the project builds successfully.
# This does NOT deploy — it only confirms the build is healthy.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # Try a clean install first; fall back to `npm install` if the lockfile
        # is out of sync (Lovable manages deps with bun, so package-lock.json
        # may drift from package.json).
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
