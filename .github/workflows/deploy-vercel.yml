name: Deploy to Vercel

# Deploys the site to Vercel on every push to main.
#
# REQUIRED GitHub repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       → https://vercel.com/account/tokens
#   VERCEL_ORG_ID      → from .vercel/project.json after running `vercel link` locally
#   VERCEL_PROJECT_ID  → from .vercel/project.json after running `vercel link` locally
#
# After the first successful run, your live URL will be printed in the job logs
# and visible in your Vercel dashboard (e.g. https://your-project.vercel.app).
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to: $url"
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Job summary
        run: |
          echo "### 🚀 Deployment successful" >> "$GITHUB_STEP_SUMMARY"
          echo "Live URL: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
